services:
  - type: web
    name: multi-agent-textile-foundry
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -e '.[dev]'
    startCommand: alembic upgrade head && uvicorn textile_foundry.api:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DATABASE_URL
        value: sqlite+pysqlite:///./textile_foundry.db
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TEXTILE_API_OFFLINE
        value: "false"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"
      - key: OPENAI_MAX_RETRIES
        value: "2"
